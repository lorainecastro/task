<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Task</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  <style>
    body {
      background-color: #0a0b0f;
      color: #f3f4f6;
      font-family: 'Inter', system-ui, sans-serif;
    }
    .card {
      background-color: #18181b;
      border: 1px solid #3f3f46;
    }
    .input {
      background-color: #27272a;
      border: 1px solid #3f3f46;
      color: #f3f4f6;
    }
    .input:focus {
      border-color: #10b981;
      outline: none;
    }
    .tab-active {
      border-bottom: 3px solid #10b981;
      color: white;
      background-color: #27272a;
    }

    select.status-select {
      font-weight: 500;
      border-radius: 12px;
      padding: 6px 16px;
      border: none;
      cursor: pointer;
      transition: all 0.2s;
    }
    .status-not-started { background-color: #3f2a2a; color: #f87171; }
    .status-in-progress { background-color: #3f3a2a; color: #fbbf24; }
    .status-completed  { background-color: #2a3f35; color: #34d399; }
  </style>
</head>
<body class="min-h-screen p-6">

  <div class="max-w-7xl mx-auto">
    
    <!-- Header -->
    <div class="flex items-end justify-between mb-8">
      <div>
        <h1 class="text-3xl font-bold text-green-400 tracking-tight">Task Management</h1>
        <p class="text-zinc-400 mt-1">Stay organized • <span id="task-count" class="font-medium">0 tasks</span></p>
      </div>
      <div class="w-10 h-10 bg-green-400 text-zinc-950 rounded-2xl flex items-center justify-center font-semibold text-xl shadow-inner">
        LC
      </div>
    </div>

    <div class="grid grid-cols-1 lg:grid-cols-12 gap-6">

      <!-- Main Task List -->
      <div class="lg:col-span-8 card rounded-3xl overflow-hidden">
        
        <div class="px-6 py-5 border-b border-zinc-700 flex items-center justify-between">
          <h2 class="font-semibold text-xl">My Tasks</h2>
          
          <div class="flex items-center gap-3">
            <span id="shown-count" class="text-xs font-mono text-zinc-500">0 shown</span>
            
            <button id="clear-completed-btn"
                    onclick="clearCompletedTasks()"
                    class="hidden items-center gap-2 px-4 py-2 bg-zinc-800 hover:bg-red-900/30 hover:text-red-400 text-zinc-400 rounded-2xl text-sm font-medium transition-all">
              <i class="fa-solid fa-arrow-rotate-left"></i>
              Clear Completed
            </button>
          </div>
        </div>

        <!-- Tabs -->
        <div class="flex border-b border-zinc-700 bg-zinc-900">
          <button onclick="setFilter('all')" id="tab-all" class="tab-button tab-active px-6 py-4 text-sm font-medium flex-1 lg:flex-none">All</button>
          <button onclick="setFilter('notstarted')" id="tab-notstarted" class="tab-button px-6 py-4 text-sm font-medium text-zinc-400 hover:text-white flex-1 lg:flex-none">Not Started</button>
          <button onclick="setFilter('inprogress')" id="tab-inprogress" class="tab-button px-6 py-4 text-sm font-medium text-zinc-400 hover:text-white flex-1 lg:flex-none">In Progress</button>
          <button onclick="setFilter('completed')" id="tab-completed" class="tab-button px-6 py-4 text-sm font-medium text-zinc-400 hover:text-white flex-1 lg:flex-none">Completed</button>
        </div>

        <!-- Tasks Table -->
        <div class="overflow-x-auto">
          <table class="w-full">
            <thead>
              <tr class="border-b border-zinc-700">
                <th class="px-6 py-4 text-left text-xs font-medium uppercase tracking-widest text-zinc-500">TASK</th>
                <th class="px-6 py-4 text-left text-xs font-medium uppercase tracking-widest text-zinc-500">DESCRIPTION</th>
                <th class="px-6 py-4 text-left text-xs font-medium uppercase tracking-widest text-zinc-500">STATUS</th>
                <th class="px-6 py-4 w-28"></th>
              </tr>
            </thead>
            <tbody id="tasks-body" class="text-sm"></tbody>
          </table>
        </div>

        <div id="empty-state" class="hidden py-20 text-center text-zinc-500">
          <i class="fa-solid fa-clipboard-list text-5xl mb-4 opacity-50"></i><br>
          No tasks yet.<br>Create one on the right.
        </div>
      </div>

      <!-- New Task Sidebar -->
      <div class="lg:col-span-4 card rounded-3xl p-6 sticky top-6">
        <h3 class="text-xl font-semibold mb-6 flex items-center gap-2">
          <i class="fa-solid fa-plus text-green-400"></i>
          New Task
        </h3>
        
        <div class="space-y-5">
          <div>
            <label class="block text-xs uppercase tracking-widest text-zinc-500 mb-2">Task Title</label>
            <input id="title-input" type="text" 
                   class="input w-full px-5 py-4 rounded-2xl text-base"
                   placeholder="What needs to be done?">
          </div>

          <div>
            <label class="block text-xs uppercase tracking-widest text-zinc-500 mb-2">Description</label>
            <textarea id="desc-input" rows="5"
                      class="input w-full px-5 py-4 rounded-3xl resize-none text-base"
                      placeholder="Add details, notes, or context..."></textarea>
          </div>

          <button onclick="addTask()" 
                  class="w-full mt-4 bg-green-400 hover:bg-green-300 text-zinc-950 font-semibold py-4 rounded-2xl transition-all text-base">
            Create Task
          </button>
        </div>
      </div>
    </div>

    <!-- Footer -->
    <div class="mt-16 text-center text-zinc-500 text-sm">
      <p class="flex items-center justify-center gap-2">
        <i class="fa-solid fa-lock"></i>
        All tasks are stored in your browser's local storage only
      </p>
      <p onclick="clearAllData()" 
         class="cursor-pointer hover:text-red-400 transition-colors mt-4 text-xs">
        Clear all data
      </p>
    </div>
  </div>

  <!-- Edit Modal -->
  <div id="edit-modal" class="hidden fixed inset-0 bg-black/70 flex items-center justify-center z-50 p-4">
    <div class="card rounded-3xl w-full max-w-lg p-8">
      <h3 class="text-2xl font-semibold mb-6">Edit Task</h3>
      <input id="edit-id" type="hidden">
      
      <div class="space-y-5">
        <div>
          <label class="block text-xs uppercase tracking-widest text-zinc-500 mb-2">Task Title</label>
          <input id="edit-title" type="text" 
                 class="input w-full px-5 py-4 rounded-2xl text-base">
        </div>
        <div>
          <label class="block text-xs uppercase tracking-widest text-zinc-500 mb-2">Description</label>
          <textarea id="edit-desc" rows="4"
                    class="input w-full px-5 py-4 rounded-3xl resize-none text-base"></textarea>
        </div>
      </div>
      
      <div class="flex gap-3 mt-8">
        <button onclick="closeEditModal()" 
                class="flex-1 py-4 border border-zinc-700 hover:bg-zinc-800 rounded-2xl transition-colors">
          Cancel
        </button>
        <button onclick="saveEdit()" 
                class="flex-1 py-4 bg-green-400 text-zinc-950 font-semibold rounded-2xl hover:bg-green-300">
          Save Changes
        </button>
      </div>
    </div>
  </div>

  <script>
    let tasks = [];
    let currentFilter = 'all';

    function saveToLocalStorage() {
      localStorage.setItem('tasks', JSON.stringify(tasks));
    }

    function loadFromLocalStorage() {
      const saved = localStorage.getItem('tasks');
      if (saved) tasks = JSON.parse(saved);
    }

    function getStatusClass(status) {
      if (status === 'Not Started') return 'status-not-started';
      if (status === 'In Progress') return 'status-in-progress';
      if (status === 'Completed') return 'status-completed';
      return '';
    }

    function hasCompletedTasks() {
      return tasks.some(t => t.status === 'Completed');
    }

    function updateClearButton() {
      const btn = document.getElementById('clear-completed-btn');
      if (hasCompletedTasks()) {
        btn.classList.remove('hidden');
        btn.classList.add('flex');
      } else {
        btn.classList.add('hidden');
        btn.classList.remove('flex');
      }
    }

    function renderTasks() {
      const tbody = document.getElementById('tasks-body');
      tbody.innerHTML = '';

      let filtered = tasks;
      if (currentFilter === 'notstarted') filtered = tasks.filter(t => t.status === 'Not Started');
      if (currentFilter === 'inprogress') filtered = tasks.filter(t => t.status === 'In Progress');
      if (currentFilter === 'completed') filtered = tasks.filter(t => t.status === 'Completed');

      document.getElementById('task-count').textContent = `${tasks.length} task${tasks.length !== 1 ? 's' : ''}`;
      document.getElementById('shown-count').textContent = `${filtered.length} shown`;

      document.getElementById('empty-state').classList.toggle('hidden', filtered.length !== 0);

      filtered.forEach(task => {
        const row = document.createElement('tr');
        row.className = "border-t border-zinc-700 hover:bg-zinc-800 transition-colors";
        row.innerHTML = `
          <td class="px-6 py-5 font-medium">${task.title}</td>
          <td class="px-6 py-5 text-zinc-400">
            ${task.description ? task.description : '<span class="italic opacity-60">No description</span>'}
          </td>
          <td class="px-6 py-5">
            <select onchange="updateStatus('${task.id}', this.value)" 
                    class="status-select ${getStatusClass(task.status)}">
              <option value="Not Started" ${task.status === 'Not Started' ? 'selected' : ''} class="status-not-started">Not Started</option>
              <option value="In Progress" ${task.status === 'In Progress' ? 'selected' : ''} class="status-in-progress">In Progress</option>
              <option value="Completed" ${task.status === 'Completed' ? 'selected' : ''} class="status-completed">Completed</option>
            </select>
          </td>
          <td class="px-6 py-5">
            <div class="flex items-center gap-4">
              <button onclick="editTask('${task.id}')" class="text-blue-400 hover:text-blue-500">
                <i class="fa-solid fa-pen"></i>
              </button>
              <button onclick="deleteTask('${task.id}')" class="text-red-400 hover:text-red-500">
                <i class="fa-solid fa-trash"></i>
              </button>
            </div>
          </td>
        `;
        tbody.appendChild(row);
      });

      updateClearButton();
    }

    function addTask() {
      const title = document.getElementById('title-input').value.trim();
      if (!title) return;

      tasks.unshift({
        id: 'task-' + Date.now(),
        title: title,
        description: document.getElementById('desc-input').value.trim(),
        status: 'Not Started'
      });

      saveToLocalStorage();
      renderTasks();

      // Clear inputs
      document.getElementById('title-input').value = '';
      document.getElementById('desc-input').value = '';
      document.getElementById('title-input').focus();
    }

    function updateStatus(id, newStatus) {
      const task = tasks.find(t => t.id === id);
      if (task) {
        task.status = newStatus;
        saveToLocalStorage();
        renderTasks();
      }
    }

    function clearCompletedTasks() {
      if (confirm("Reset all completed tasks to 'Not Started'?")) {
        tasks.forEach(task => {
          if (task.status === 'Completed') {
            task.status = 'Not Started';
          }
        });
        saveToLocalStorage();
        renderTasks();
      }
    }

    function editTask(id) {
      const task = tasks.find(t => t.id === id);
      if (!task) return;

      document.getElementById('edit-id').value = task.id;
      document.getElementById('edit-title').value = task.title;
      document.getElementById('edit-desc').value = task.description || '';

      document.getElementById('edit-modal').classList.remove('hidden');
      document.getElementById('edit-title').focus();
    }

    function saveEdit() {
      const id = document.getElementById('edit-id').value;
      const title = document.getElementById('edit-title').value.trim();
      const desc = document.getElementById('edit-desc').value.trim();

      if (!title) return;

      const task = tasks.find(t => t.id === id);
      if (task) {
        task.title = title;
        task.description = desc;
        saveToLocalStorage();
        renderTasks();
      }
      closeEditModal();
    }

    function closeEditModal() {
      document.getElementById('edit-modal').classList.add('hidden');
    }

    function deleteTask(id) {
      if (confirm("Delete this task?")) {
        tasks = tasks.filter(t => t.id !== id);
        saveToLocalStorage();
        renderTasks();
      }
    }

    function setFilter(filter) {
      currentFilter = filter;
      
      document.querySelectorAll('.tab-button').forEach(btn => {
        btn.classList.toggle('tab-active', 
          (filter === 'all' && btn.id === 'tab-all') ||
          (filter === 'notstarted' && btn.id === 'tab-notstarted') ||
          (filter === 'inprogress' && btn.id === 'tab-inprogress') ||
          (filter === 'completed' && btn.id === 'tab-completed')
        );
      });
      
      renderTasks();
    }

    function clearAllData() {
      if (confirm("Clear ALL tasks? This cannot be undone.")) {
        tasks = [];
        localStorage.removeItem('tasks');
        renderTasks();
      }
    }

    // Keyboard Support
    function setupKeyboardListeners() {
      // New Task Form
      const titleInput = document.getElementById('title-input');
      const descInput = document.getElementById('desc-input');

      titleInput.addEventListener('keypress', e => {
        if (e.key === 'Enter') addTask();
      });

      descInput.addEventListener('keypress', e => {
        if (e.key === 'Enter') addTask();
      });

      // Edit Modal
      const editTitle = document.getElementById('edit-title');
      const editDesc = document.getElementById('edit-desc');

      editTitle.addEventListener('keypress', e => {
        if (e.key === 'Enter') saveEdit();
      });

      editDesc.addEventListener('keypress', e => {
        if (e.key === 'Enter') saveEdit();
      });
    }

    // Initialize
    window.onload = () => {
      loadFromLocalStorage();
      renderTasks();
      setupKeyboardListeners();
    };
  </script>
</body>
</html>
